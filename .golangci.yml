version: "2"
run:
  tests: true
linters:
  enable:
    - bodyclose
    - durationcheck
    - errname
    - gocritic
    - gosec
    - misspell
    - nilerr
    - unconvert
    - unparam
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
    gosec:
      excludes:
        - G104
        - G304
        - G402
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
        source: json\.NewEncoder.*\.Encode
      - linters:
          - errcheck
        source: w\.Write
      # gosec G124 wants Secure/HttpOnly/SameSite on cookies. Tests attach
      # cookies to request objects via req.AddCookie, where those attributes are
      # response-only directives and carry no meaning, so the finding is a false
      # positive in test code.
      - linters:
          - gosec
        path: _test\.go
        text: G124
    paths:
      - third_party$
      - builtin$
      - examples$
      - node_modules
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/mescon/muximux/v3
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
      - node_modules
