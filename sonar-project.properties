sonar.projectKey=mescon_Muximux
sonar.organization=mescon
# sonar.projectVersion is set dynamically in CI from the latest git tag
# (.github/workflows/ci.yml) so the "Previous version" new code period
# tracks releases instead of going stale here.

sonar.sources=.
sonar.exclusions=**/node_modules/**,**/dist/**,**/vendor/**,**/*_test.go,**/*.test.ts,**/*.spec.ts,**/testdata/**,**/dev/**,**/paraglide/**

sonar.tests=.
sonar.test.inclusions=**/*_test.go,**/*.test.ts,**/*.spec.ts

# go:S2092 ("cookie without Secure flag") on the session cookie. HttpOnly and
# SameSite are always set; Secure is intentionally configurable via
# secure_cookies so Muximux can run behind plain HTTP (documented in
# security.md). Mirrors the gosec G124 exclusion in .golangci.yml.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S2092
sonar.issue.ignore.multicriteria.e1.resourceKey=**/internal/auth/session.go

sonar.coverage.exclusions=cmd/**,**/*.svelte,web/public/sw.js
sonar.go.coverage.reportPaths=coverage.txt
sonar.javascript.lcov.reportPaths=web/coverage/lcov.info

sonar.sourceEncoding=UTF-8
