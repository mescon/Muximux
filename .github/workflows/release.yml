name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: go.mod

      - name: Build frontend
        run: |
          npm ci --ignore-scripts
          npm run build
        working-directory: web

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          VERSION="${VERSION#v}"
          SHORT_COMMIT="${COMMIT:0:8}"

          EXT=""
          if [ "${GOOS}" = "windows" ]; then
            EXT=".exe"
          fi

          go build \
            -tags embed_web \
            -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${SHORT_COMMIT} -X main.buildDate=${BUILD_DATE}" \
            -o "muximux-${GOOS}-${GOARCH}${EXT}" \
            ./cmd/muximux

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: muximux-${{ matrix.goos }}-${{ matrix.goarch }}
          path: muximux-*

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Login to Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Guards against the cross-compile regression where every platform's
      # image shipped the same amd64 binary (an amd64 binary inside the arm64
      # image, which then crashes under QEMU on real arm64 hosts). Pull each
      # platform variant by digest and assert the embedded binary's ELF
      # machine type matches the image platform.
      - name: Verify each platform ships a matching-arch binary
        run: |
          set -euo pipefail
          # IMAGE_NAME comes from github.repository, which can contain
          # uppercase (mescon/Muximux). A hand-built image ref must be
          # lowercased or docker rejects it ("repository name must be
          # lowercase"); the metadata-action lowercases the push tags for us,
          # but these manual refs do not get that treatment.
          name="$(printf '%s' "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          repo="${REGISTRY}/${name}"
          index="${repo}@${{ steps.build.outputs.digest }}"
          rc=0
          for arch in amd64 arm64; do
            # Address each platform by its OWN single-arch manifest digest.
            # Creating a container from the multi-arch index digest with
            # --platform collides on the runner once a second platform is
            # materialized ("cannot overwrite digest"), so resolve the
            # per-platform digest from the index first.
            digest="$(docker buildx imagetools inspect --raw "${index}" \
              | jq -r --arg a "${arch}" \
                  '.manifests[] | select(.platform.os == "linux" and .platform.architecture == $a) | .digest')"
            if [ -z "${digest}" ] || [ "${digest}" = "null" ]; then
              echo "::error::no linux/${arch} manifest found in the image index"; rc=1; continue
            fi
            cid="$(docker create "${repo}@${digest}" /app/muximux)"
            docker cp "${cid}:/app/muximux" "/tmp/muximux-${arch}"
            docker rm "${cid}" >/dev/null
            # ELF e_machine is a little-endian 2-byte field at offset 18:
            # 3e00 = x86-64, b700 = AArch64. Read with od (coreutils) so this
            # check has no dependency on binutils/readelf being installed.
            machine="$(od -An -tx1 -j18 -N2 "/tmp/muximux-${arch}" | tr -d ' ')"
            echo "linux/${arch} image -> e_machine=${machine}"
            case "${arch}:${machine}" in
              amd64:3e00|arm64:b700) : ;;
              *) echo "::error::linux/${arch} image has a wrong-arch binary (e_machine=${machine})"; rc=1 ;;
            esac
          done
          exit "${rc}"

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-docker]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts
          pattern: muximux-*
          merge-multiple: true

      - name: Create checksums
        run: |
          cd artifacts
          sha256sum muximux-* > checksums.txt

      - name: Extract release notes
        id: changelog
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          MAJOR="${VERSION%%.*}"
          # Prefer a handwritten release notes draft if one exists
          for DRAFT in "dev/release-notes-v${VERSION}.md" "dev/v${MAJOR}-release-notes-draft.md"; do
            if [ -f "$DRAFT" ]; then
              cp "$DRAFT" release-notes.md
              echo "found=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          # Fall back to extracting from CHANGELOG
          NOTES=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -n "$NOTES" ]; then
            echo "$NOTES" > release-notes.md
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release (with CHANGELOG)
        if: steps.changelog.outputs.found == 'true'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          body_path: release-notes.md
          files: |
            artifacts/muximux-*
            artifacts/checksums.txt

      - name: Create Release (auto-generated notes)
        if: steps.changelog.outputs.found != 'true'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          generate_release_notes: true
          files: |
            artifacts/muximux-*
            artifacts/checksums.txt
